rules = [
  DisableSyntax
]

DisableSyntax.excludePackages = [
  "proofgate.cli",
  "proofgate.examples",
  "proofgate.runtime.spark"
]

DisableSyntax {
  regex = [
    {
      id = NoSysEnv
      pattern = "\\bsys\\.env\\b"
      message = "Inject typed config at the app edge; avoid sys.env in library code."
    },
    {
      id = NoSystemGetenv
      pattern = "\\bSystem\\.getenv\\b"
      message = "Inject typed config at the app edge; avoid System.getenv in library code."
    },
    {
      id = NoConfigFactory
      pattern = "\\bConfigFactory\\b"
      message = "Avoid direct config loading in core code."
    },
    {
      id = NoKeywordTry
      pattern = "(?s)\\btry\\s*\\{"
      message = "Prefer typed errors and explicit conversion at the edge instead of raw try blocks."
    },
    {
      id = NoKeywordCatch
      pattern = "(?s)\\bcatch\\s*\\{"
      message = "Prefer mapping typed failures instead of catch in core code."
    },
    {
      id = NoKeywordFinally
      pattern = "(?s)\\bfinally\\b"
      message = "Prefer dedicated resource-safety combinators or edge-local cleanup."
    },
    {
      id = NoKeywordThrow
      pattern = "\\bthrow\\b"
      message = "Use typed errors in the core review flow instead of throwing."
    }
  ]
}
